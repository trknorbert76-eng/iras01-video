<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TN: Az Írás</title>

<meta property="og:title" content="Török Norbert: Az írás">
<meta property="og:description" content="Interaktív költői narratíva">
<meta property="og:image" content="https://trknorbert76-eng.github.io/iras01-video/elolap.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://trknorbert76-eng.github.io/iras01-video/">
<meta name="twitter:card" content="summary_large_image">

  <style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  width: 100%;
  min-height: 100%;
}

body {
  overflow-x: hidden;
}

.video-wrapper {
  max-width: 960px;
  margin: 0 auto;
  background: black;
}

.video-container {
  position: relative;
  width: 100%;
  background: black;
}
#posterOverlay {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  top: 0;
  left: 0;
  z-index: 5;

  transition: opacity 1.5s ease;
  pointer-events: none;
}

video {
  width: 100%;
  height: auto;
  display: block;
  background: black;
}

/* normál nézetben is működik */
#continueBtn {
  position: fixed;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%);
  z-index: 9999;

  display: none;
  padding: 16px 30px;
  font-size: 20px;
  background: rgba(255, 255, 255, 0.96);
  color: black;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(0,0,0,0.45);
  font-weight: bold;
  min-width: 220px;
}

#continueBtn:hover {
  background: white;
}

@media (max-width: 768px) {
  .video-wrapper {
    margin: 0 auto;
  }

  #continueBtn {
    width: calc(100vw - 40px);
    max-width: 360px;
    font-size: 18px;
    padding: 15px 20px;
    bottom: 20px;
  }
}
</style>
</head>

<body>

<div class="video-wrapper">
<div class="video-container">


  <video
  id="mainVideo"
  controls
  playsinline
  webkit-playsinline
  preload="metadata"
  poster="elolap.png"
>
  <source src="https://res.cloudinary.com/dgcumjeuj/video/upload/v1774611443/T%C3%B6r%C3%B6k_Norbert_Az_%C3%ADr%C3%A1s_01_rlkfnc.mp4" type="video/mp4">
</video>

</div>
</div>

<button id="continueBtn">Folytatás</button>

<audio id="bgAudio" preload="auto">
  <source src="vershang01.mp3" type="audio/mpeg">
</audio>

<script>
const SUPABASE_URL = "https://hhysuxfwdjwlxtmlxnrv.supabase.co";
const SUPABASE_KEY = "sb_publishable_4Btoi0wsypr48xQH31RMaQ_r1YrPpsv";

async function track(event){
  try{
    await fetch(SUPABASE_URL + "/rest/v1/jesus_stats", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ event })
    });
  }catch(e){}
}

// oldal betöltés
track("video_page_01");

const video = document.getElementById("mainVideo");
const poster = document.getElementById("posterOverlay");
const btn = document.getElementById("continueBtn");
const bgAudio = document.getElementById("bgAudio");

  video.addEventListener("play", () => {
  if (!poster) return;

  poster.style.opacity = "0";

  setTimeout(() => {
    poster.style.display = "none";
  }, 1500);
});

let started = false;
let reached = false;
let endAudioStarted = false;

// fullscreen kilépés többféle böngészőre
function exitAnyFullscreen() {
  try {
    if (document.fullscreenElement && document.exitFullscreen) {
      document.exitFullscreen();
    }
  } catch(e) {}

  try {
    if (document.webkitFullscreenElement && document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    }
  } catch(e) {}

  try {
    if (video.webkitDisplayingFullscreen && video.webkitExitFullscreen) {
      video.webkitExitFullscreen();
    }
  } catch(e) {}

  try {
    if (document.msFullscreenElement && document.msExitFullscreen) {
      document.msExitFullscreen();
    }
  } catch(e) {}
}

function showContinue() {
  btn.style.display = "block";

  setTimeout(() => {
    btn.scrollIntoView({ behavior: "smooth", block: "center" });
  }, 250);
}

function hideContinue() {
  btn.style.display = "none";
}

async function startEndAudioOnce() {
  if (endAudioStarted) return;
  endAudioStarted = true;

  try {
    bgAudio.currentTime = 0;
    await bgAudio.play();
  } catch (e) {
    console.log("Audio play hiba:", e);
  }
}

function stopEndAudio() {
  try {
    bgAudio.pause();
    bgAudio.currentTime = 0;
  } catch(e) {}
}

function resetAfterBackwardSeek() {
  stopEndAudio();
  hideContinue();
  reached = false;
  endAudioStarted = false;
}

// VIDEÓ INDÍTÁS
video.addEventListener("play", () => {
  if (!started) {
    track("video_start_01");
    started = true;
  }
});

// ELÉRTE A 2:26-OT (146 mp)
video.addEventListener("timeupdate", async () => {
  if (!reached && video.currentTime >= 146) {
    reached = true;
    track("video_reach_01");

    exitAnyFullscreen();

    setTimeout(async () => {
      video.pause();
      showContinue();
      await startEndAudioOnce();
    }, 300);
  }
});

// ha elkezd visszatekerni 2:26 elé
video.addEventListener("seeking", () => {
  if (video.currentTime < 146 && endAudioStarted) {
    resetAfterBackwardSeek();
  }
});

// ha előre vagy hátra tekerés után megáll
video.addEventListener("seeked", async () => {
  if (video.currentTime < 146) {
    resetAfterBackwardSeek();
    return;
  }

  if (!reached && video.currentTime >= 146) {
    reached = true;
    track("video_reach_01");

    exitAnyFullscreen();

    setTimeout(async () => {
      video.pause();
      showContinue();
      await startEndAudioOnce();
    }, 300);
  }
});

// ha valamiért fullscreen állapotváltás közben jut el ide
document.addEventListener("fullscreenchange", () => {
  if (reached) showContinue();
});

document.addEventListener("webkitfullscreenchange", () => {
  if (reached) showContinue();
});

// hang leállítása kilépésnél / lapváltásnál
window.addEventListener("pagehide", stopEndAudio);
window.addEventListener("beforeunload", stopEndAudio);

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    stopEndAudio();
  }
});

// TOVÁBB GOMB
btn.addEventListener("click", () => {
  track("continue_01");
  stopEndAudio();
  window.location.href = "https://trknorbert76-eng.github.io/iras-01/";
});
</script>

</body>
</html>
