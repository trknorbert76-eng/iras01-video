<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Az Írás – Hívő</title>

<style>
body {
  margin: 0;
  background-color: black;
}

.video-wrapper {
  max-width: 960px;
  margin: 40px auto;
}

.video-container {
  position: relative;
  width: 100%;
}

video {
  width: 100%;
  height: auto;
  display: block;
}

#continueBtn {
  position: absolute;
  left: 50%;
  top: 68%;
  transform: translate(-50%, -50%);
  z-index: 10;

  display: none;
  padding: 14px 28px;
  font-size: 20px;
  background: rgba(255, 255, 255, 0.92);
  color: black;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(0,0,0,0.45);
  font-weight: bold;
}

#continueBtn:hover {
  background: white;
}
</style>
</head>

<body>

<div class="video-wrapper">
  <div class="video-container">

    <video id="mainVideo" controls playsinline>
      <source src="https://res.cloudinary.com/dgcumjeuj/video/upload/v1774557619/T%C3%B6r%C3%B6k_Norbert_Az_%C3%ADr%C3%A1s_01_rlkfnc.mp4" type="video/mp4">
    </video>

    <button id="continueBtn">
      Folytatás
    </button>

  </div>
</div>

<script>
const SUPABASE_URL = "https://hhysuxfwdjwlxtmlxnrv.supabase.co";
const SUPABASE_KEY = "sb_publishable_4Btoi0wsypr48xQH31RMaQ_r1YrPpsv";

async function track(event){
  try{
    await fetch(SUPABASE_URL + "/rest/v1/jesus_stats", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ event })
    });
  }catch(e){}
}

// oldal betöltés
track("video_page_01");

const video = document.getElementById("mainVideo");
const btn = document.getElementById("continueBtn");

let started = false;
let reached = false;

// VIDEÓ INDÍTÁS
video.addEventListener("play", () => {
  if (!started) {
    track("video_start_01");
    started = true;
  }
});

// ELÉRTE A 2:26-OT (146 mp)
video.addEventListener("timeupdate", () => {
  if (!reached && video.currentTime >= 146) {
    btn.style.display = "block";
    track("video_reach_01");
    reached = true;
  }
});

// TOVÁBB GOMB
btn.addEventListener("click", () => {
  track("continue_01");
  window.location.href = "https://trknorbert76-eng.github.io/iras-01/";
});
</script>

</body>
</html>
