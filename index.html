<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Az Írás – Hívő</title>

<style>
body {
  margin: 0;
  background-color: black;
}

.video-wrapper {
  max-width: 960px;
  margin: 40px auto;
}

.video-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  height: 0;
}

.video-container iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

#continueBtn {
  position: absolute;
  left: 50%;
  top: 68%;
  transform: translate(-50%, -50%);
  z-index: 10;

  display: none;
  padding: 14px 28px;
  font-size: 20px;
  background: rgba(255, 255, 255, 0.92);
  color: black;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(0,0,0,0.45);
  font-weight: bold;
}

#continueBtn:hover {
  background: white;
}
</style>
</head>

<body>

<div class="video-wrapper">
  <div class="video-container">
    <iframe 
      id="mainVideo"
      src="https://www.youtube.com/embed/PFn3w7sRm3Y?enablejsapi=1"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>

    <button id="continueBtn">
      Folytatás
    </button>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  var player;
  var shown = false;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('mainVideo', {
      events: {
        'onReady': onPlayerReady
      }
    });
  }

  function onPlayerReady() {
    setInterval(function () {
      if (!player || shown) return;

      var t = 0;
      try {
        t = player.getCurrentTime();
      } catch (e) {
        return;
      }

      if (t >= 146) { // 2:26
        document.getElementById("continueBtn").style.display = "block";
        shown = true;
      }
    }, 500);

    document.getElementById("continueBtn").onclick = function () {
      window.location.href = "https://trknorbert76-eng.github.io/iras-01/";
    };
  }
</script>

</body>
</html>
